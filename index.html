<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PeerCall — Video calls without a server</title>
    <meta
      name="description"
      content="Free video calls powered by WebRTC. No signup, no backend, no tracking. Open a link and call."
    />
    <meta name="theme-color" content="#0f0f0f" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- LOBBY -->
    <div id="lobby" class="view">
      <div class="lobby-content">
        <div class="lobby-logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="12" fill="#6366f1" />
            <path d="M16 20a4 4 0 1 1 8 0 4 4 0 0 1-8 0Z" fill="white" />
            <path d="M24 20a4 4 0 1 1 8 0 4 4 0 0 1-8 0Z" fill="white" fill-opacity=".7" />
            <path
              d="M14 28c0-2.2 1.8-4 4-4h12c2.2 0 4 1.8 4 4v4c0 2.2-1.8 4-4 4H18c-2.2 0-4-1.8-4-4v-4Z"
              fill="white"
              fill-opacity=".85"
            />
          </svg>
        </div>
        <h1>PeerCall</h1>
        <p class="subtitle">Video calls that never touch a server.<br />No signup. No tracking. Just a link.</p>

        <div class="lobby-actions">
          <div class="name-field">
            <label for="input-name" class="name-label">Your name</label>
            <input
              id="input-name"
              type="text"
              placeholder="e.g. David"
              maxlength="24"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
          <button id="btn-create" class="btn btn-primary">
            <i data-lucide="video"></i>
            Start a call
          </button>
          <div class="divider"><span>or join with a code</span></div>
          <form id="form-join" class="join-form">
            <input
              id="input-code"
              type="text"
              placeholder="e.g. k7m9x2w4p"
              maxlength="12"
              autocomplete="off"
              spellcheck="false"
            />
            <button type="submit" class="btn btn-secondary">Join</button>
          </form>
        </div>

        <p class="lobby-footer">P2P · End-to-end encrypted · Open source</p>
      </div>
    </div>

    <!-- SETUP (green room) -->
    <div id="setup" class="view hidden">
      <div class="setup-container">
        <div class="setup-preview">
          <video id="setup-video" autoplay playsinline muted></video>
          <div id="setup-no-camera" class="setup-no-camera hidden">
            <span>📷</span>
            <p>Cámara no disponible</p>
          </div>
          <div class="setup-mic-meter" aria-hidden="true">
            <div id="setup-mic-level" class="setup-mic-level-fill"></div>
          </div>
        </div>
        <div class="setup-controls">
          <h2 id="setup-title">Preparados para entrar</h2>
          <p id="setup-hint" class="setup-hint"></p>

          <label class="setup-field">
            <span>Tu nombre</span>
            <input id="setup-name" type="text" placeholder="Tu nombre" maxlength="24" autocomplete="off" />
          </label>

          <label class="setup-field">
            <span>Cámara</span>
            <select id="setup-select-camera"></select>
          </label>

          <label class="setup-field">
            <span>Micrófono</span>
            <select id="setup-select-mic"></select>
          </label>

          <div class="filter-row">
            <label for="setup-filter-gain">Volumen del mic<span id="setup-val-gain" class="filter-val">100%</span></label>
            <input id="setup-filter-gain" type="range" min="0" max="3" step="0.05" value="1" />
          </div>

          <label class="setup-field" id="setup-speaker-field">
            <span>Altavoz</span>
            <select id="setup-select-speaker"></select>
          </label>

          <label class="setup-toggle">
            <input id="setup-toggle-noise" type="checkbox" />
            <span>Cancelación de ruido</span>
          </label>

          <details class="setup-filters">
            <summary>Filtros de cámara</summary>
            <label class="setup-toggle">
              <input id="setup-toggle-mirror" type="checkbox" />
              <span>Espejar mi vídeo</span>
            </label>
            <div class="filter-row">
              <label for="setup-filter-brightness">Brillo<span id="setup-val-brightness" class="filter-val">100%</span></label>
              <input id="setup-filter-brightness" type="range" min="0.5" max="2" step="0.05" value="1" />
            </div>
            <div class="filter-row">
              <label for="setup-filter-contrast">Contraste<span id="setup-val-contrast" class="filter-val">100%</span></label>
              <input id="setup-filter-contrast" type="range" min="0.5" max="2" step="0.05" value="1" />
            </div>
            <div class="filter-row">
              <label for="setup-filter-saturation">Saturación<span id="setup-val-saturation" class="filter-val">100%</span></label>
              <input id="setup-filter-saturation" type="range" min="0" max="2" step="0.05" value="1" />
            </div>
            <div class="filter-row">
              <label for="setup-filter-blur">Desenfoque<span id="setup-val-blur" class="filter-val">0px</span></label>
              <input id="setup-filter-blur" type="range" min="0" max="20" step="0.5" value="0" />
            </div>
            <button id="setup-btn-reset-filters" class="btn-reset">Restablecer</button>
          </details>

          <div class="setup-actions">
            <button id="btn-setup-cancel" class="btn btn-secondary">Cancelar</button>
            <button id="btn-setup-join" class="btn btn-primary">Unirse</button>
          </div>
        </div>
      </div>
    </div>

    <!-- CALL VIEW -->
    <div id="call" class="view hidden">
      <div id="video-grid" class="video-grid"></div>

      <div id="chat-panel" class="chat-panel hidden">
        <div class="chat-header">
          <span>Chat</span>
          <button id="btn-close-chat" class="btn-icon" aria-label="Close chat">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <form id="form-chat" class="chat-form">
          <input id="input-chat" type="text" placeholder="Type a message..." autocomplete="off" />
          <button type="submit" class="btn btn-small">
            <i data-lucide="send"></i>
          </button>
        </form>
      </div>

      <div id="settings-panel" class="settings-panel hidden">
        <div class="settings-header">
          <span>Audio & Video</span>
          <button id="btn-close-settings" class="btn-icon" aria-label="Close settings">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="settings-content">
          <label>
            <span>Microphone</span>
            <select id="select-audio-input"></select>
          </label>
          <div class="filter-row">
            <label for="filter-gain">Volumen del mic<span id="val-gain" class="filter-val">100%</span></label>
            <input id="filter-gain" type="range" min="0" max="3" step="0.05" value="1" />
          </div>
          <label>
            <span>Speaker</span>
            <select id="select-audio-output"></select>
          </label>
          <label>
            <span>Display name</span>
            <input id="input-display-name" type="text" maxlength="24" placeholder="Change your name" />
          </label>
        </div>
      </div>

      <div class="controls">
        <button id="btn-mic" class="control-btn" aria-label="Toggle microphone" title="Mute/Unmute">
          <i data-lucide="mic"></i>
        </button>
        <div class="control-btn-split">
          <button id="btn-camera" class="control-btn" aria-label="Toggle camera" title="Camera on/off">
            <i data-lucide="video"></i>
          </button>
          <button id="btn-camera-menu" class="control-btn-chevron" aria-label="Camera options" title="Camera options">
            <i data-lucide="chevron-up"></i>
          </button>
        </div>
        <div id="camera-panel" class="camera-panel hidden">
          <div class="camera-panel-header">
            <span>Cámara</span>
            <button id="btn-close-camera" class="btn-icon" aria-label="Close">
              <i data-lucide="x"></i>
            </button>
          </div>
          <div class="camera-panel-content">
            <label>
              <span>Dispositivo</span>
              <select id="select-video-input"></select>
            </label>
            <div class="settings-divider"></div>
            <label class="setup-toggle">
              <input id="toggle-mirror" type="checkbox" />
              <span>Espejar mi vídeo</span>
            </label>
            <div class="filter-row">
              <label for="filter-brightness">Brillo<span id="val-brightness" class="filter-val">100%</span></label>
              <input id="filter-brightness" type="range" min="0.5" max="2" step="0.05" value="1" />
            </div>
            <div class="filter-row">
              <label for="filter-contrast">Contraste<span id="val-contrast" class="filter-val">100%</span></label>
              <input id="filter-contrast" type="range" min="0.5" max="2" step="0.05" value="1" />
            </div>
            <div class="filter-row">
              <label for="filter-saturation">Saturación<span id="val-saturation" class="filter-val">100%</span></label>
              <input id="filter-saturation" type="range" min="0" max="2" step="0.05" value="1" />
            </div>
            <div class="filter-row">
              <label for="filter-blur">Desenfoque<span id="val-blur" class="filter-val">0px</span></label>
              <input id="filter-blur" type="range" min="0" max="20" step="0.5" value="0" />
            </div>
            <button id="btn-reset-filters" class="btn-reset">Restablecer</button>
          </div>
        </div>
        <button id="btn-screen" class="control-btn" aria-label="Share screen" title="Share screen">
          <i data-lucide="monitor"></i>
        </button>
        <button id="btn-noise" class="control-btn" aria-label="Noise suppression" title="Noise suppression">
          <i data-lucide="volume-x"></i>
        </button>
        <button id="btn-chat" class="control-btn" aria-label="Toggle chat" title="Chat">
          <i data-lucide="message-square"></i>
        </button>
        <button id="btn-settings" class="control-btn" aria-label="Audio/Video settings" title="Settings">
          <i data-lucide="settings"></i>
        </button>
        <button id="btn-leave" class="control-btn control-btn-danger" aria-label="Hang up" title="Hang up">
          <i data-lucide="phone-off"></i>
        </button>
      </div>

      <div id="room-info" class="room-info">
        <span id="room-code"></span>
        <button id="btn-copy" class="btn-icon" title="Copy link">
          <i data-lucide="copy"></i>
        </button>
      </div>
    </div>

    <!-- CONNECTING OVERLAY -->
    <div id="connecting" class="view hidden">
      <div class="connecting-content">
        <div class="spinner"></div>
        <p>Connecting...</p>
        <p class="connecting-detail" id="connecting-detail"></p>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
